# fly.toml — Fly.io config for Card Clash Multiplayer Server
# Deploy: fly deploy (from server/ folder)

app = "card-clash-multiplayer"
primary_region = "dxb"  # Dubai — أقرب region للسعودية

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # لا ينام أبداً ✅
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
